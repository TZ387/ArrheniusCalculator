[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ArrheniusCalculator"
version = "0.1.0"
description = "A simple GUI tool for calculating Arrhenius integral."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pyside6",
]

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
"ArrheniusCalculator" = ["qml/*.qml"]

[project.scripts]
your-app = "ArrheniusCalculator.main:main"
